name: MathMaster — Daily Math Posts (EN)

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC
    - cron: '0 13 * * *'   # 13:00 UTC
    - cron: '0 20 * * *'   # 20:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: ✍️ Generate and publish post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python gerar_post_en.py

      - name: 📤 Save artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-en-${{ github.run_number }}
          path: |
            *.html
            publicados_en.json
            sitemap.xml
          retention-days: 3
          if-no-files-found: warn
